<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Buy Package</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #0a0b14;
            --card: #141827;
            --border: #1e2240;
            --input: #0d1020;
            --blue: #448AFF;
            --text: #ffffff;
            --text2: #bcc6e0;
            --text3: #8899cc;
            --text4: #5a6a99;
            --green: #2ed573;
            --red: #ff4757;
            --gold: #FFD700;
            --orange: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 30px;
        }

        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background: rgba(68,138,255,0.1);
            border: 1px solid rgba(68,138,255,0.2);
            color: var(--blue);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(68,138,255,0.2);
        }
        .header h1 {
            font-size: 16px;
            font-weight: 800;
        }
        .header h1 span {
            color: var(--gold);
        }

        .main-content {
            padding: 16px;
            max-width: 450px;
            margin: 0 auto;
        }

        /* Package Card */
        .package-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        .package-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .package-price {
            font-size: 36px;
            font-weight: 800;
            color: var(--blue);
            margin-bottom: 5px;
        }
        .package-price small {
            font-size: 14px;
            color: var(--text3);
        }
        .package-duration {
            font-size: 12px;
            color: var(--text3);
        }

        /* Payment Method Tabs */
        .payment-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .payment-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text3);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .payment-tab.active {
            background: var(--blue);
            color: white;
        }

        /* Form Card */
        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            color: var(--blue);
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 14px;
            background: var(--input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--blue);
        }

        /* Payment Address Box */
        .address-box {
            background: var(--input);
            border: 1px solid var(--blue);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .address-text {
            font-family: monospace;
            font-size: 12px;
            color: var(--blue);
            word-break: break-all;
            flex: 1;
        }
        .copy-address {
            background: rgba(68,138,255,0.15);
            border: 1px solid var(--blue);
            color: var(--blue);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .copy-address:hover {
            background: var(--blue);
            color: white;
        }

        /* Upload Area */
        .upload-area {
            background: var(--input);
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: var(--blue);
            background: rgba(68,138,255,0.03);
        }
        .upload-icon {
            font-size: 32px;
            color: var(--text3);
            margin-bottom: 8px;
        }
        .upload-text {
            font-size: 12px;
            color: var(--text3);
        }
        .upload-preview {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 10px;
            margin-top: 12px;
            display: none;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--green), #00b894);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46,213,115,0.3);
        }
        .submit-btn:disabled {
            background: #1e2240;
            color: #666;
            transform: none;
        }

        /* Loading Spinner */
        .submit-btn.loading .btn-text {
            display: none;
        }
        .submit-btn.loading .spinner {
            display: inline-block;
        }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .toast-success {
            background: var(--green);
            color: white;
        }
        .toast-error {
            background: var(--red);
            color: white;
        }

        .contact-note {
            text-align: center;
            font-size: 10px;
            color: var(--text4);
            margin-top: 10px;
        }
        .contact-note a {
            color: var(--blue);
            text-decoration: none;
        }

        @media (max-width: 450px) {
            .package-price { font-size: 28px; }
            .package-name { font-size: 18px; }
            .form-card { padding: 18px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <h1><span>PACKAGE</span> PAYMENT</h1>
    </div>

    <div class="toast" id="toast"></div>

    <div class="main-content">
        <!-- Package Details -->
        <div class="package-card">
            <div class="package-name" id="packageName">Loading...</div>
            <div class="package-price" id="packagePrice">₹0</div>
            <div class="package-duration" id="packageDuration">-</div>
        </div>

        <!-- Payment Method Tabs -->
        <div class="payment-tabs">
            <button class="payment-tab active" data-method="upi" onclick="selectMethod('upi')">UPI</button>
            <button class="payment-tab" data-method="bkash" onclick="selectMethod('bkash')">Bkash</button>
            <button class="payment-tab" data-method="usdt" onclick="selectMethod('usdt')">USDT</button>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <div class="section-title">
                <i class="fas fa-user-circle"></i> Your Details
            </div>

            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="userName" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" id="userPhone" placeholder="Enter your phone number">
            </div>

            <!-- UPI Fields -->
            <div id="upiFields">
                <div class="form-group">
                    <label class="form-label">Your UPI ID</label>
                    <input type="text" class="form-input" id="userUpiId" placeholder="username@okhdfcbank">
                </div>
                <div class="section-title">
                    <i class="fas fa-building"></i> Send Payment To
                </div>
                <div class="address-box" id="upiAddressBox">
                    <span class="address-text" id="upiAddress">Loading...</span>
                    <button class="copy-address" id="copyUpiBtn" onclick="copyAddress('upi')">Copy</button>
                </div>
                <div class="form-group">
                    <label class="form-label">Transaction ID / UTR</label>
                    <input type="text" class="form-input" id="transactionId" placeholder="Enter transaction ID">
                </div>
            </div>

            <!-- Bkash Fields -->
            <div id="bkashFields" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Your Bkash Number</label>
                    <input type="tel" class="form-input" id="userBkashNumber" placeholder="01XXXXXXXXX">
                </div>
                <div class="section-title">
                    <i class="fas fa-building"></i> Send Payment To
                </div>
                <div class="address-box" id="bkashAddressBox">
                    <span class="address-text" id="bkashAddress">Loading...</span>
                    <button class="copy-address" id="copyBkashBtn" onclick="copyAddress('bkash')">Copy</button>
                </div>
                <div class="form-group">
                    <label class="form-label">Transaction ID / Reference No</label>
                    <input type="text" class="form-input" id="bkashTransactionId" placeholder="Enter transaction ID">
                </div>
            </div>

            <!-- USDT Fields -->
            <div id="usdtFields" style="display: none;">
                <div class="section-title">
                    <i class="fas fa-wallet"></i> Send Payment To (USDT TRC20)
                </div>
                <div class="address-box" id="usdtAddressBox">
                    <span class="address-text" id="usdtAddress">Loading...</span>
                    <button class="copy-address" id="copyUsdtBtn" onclick="copyAddress('usdt')">Copy</button>
                </div>
            </div>

            <!-- Screenshot Upload -->
            <div class="section-title">
                <i class="fas fa-camera"></i> Payment Screenshot
            </div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="upload-text">Click to upload payment screenshot</div>
                <img class="upload-preview" id="uploadPreview">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage(event)">

            <!-- Submit Button -->
            <button class="submit-btn" id="submitBtn" onclick="submitPayment()">
                <span class="btn-text">💰 SUBMIT PAYMENT</span>
                <span class="spinner"></span>
            </button>
        </div>

        <div class="contact-note">
            Need help? <a href="https://t.me/+CNJHfpdP1ck0NDA1" target="_blank">Contact Support</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7UVJOB_jWbPuRAqkVXJfq4MgOYUS8hds",
            authDomain: "revo-fixer-18514.firebaseapp.com",
            databaseURL: "https://revo-fixer-18514-default-rtdb.firebaseio.com",
            projectId: "revo-fixer-18514",
            storageBucket: "revo-fixer-18514.firebasestorage.app",
            messagingSenderId: "556764878482",
            appId: "1:556764878482:web:ba5c72a25db0127572384b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userId = localStorage.getItem('userId');
        let selectedMethod = 'upi';
        let selectedFile = null;
        let currentUpiAddress = '';
        let currentBkashAddress = '';
        let currentUsdtAddress = '';

        // Get package details from localStorage
        const packageName = localStorage.getItem('selectedPackage') || '1 Hour Package';
        const packagePrice = localStorage.getItem('selectedPrice') || '2000';
        const packageHours = localStorage.getItem('selectedHours') || '1';

        document.getElementById('packageName').textContent = packageName;
        document.getElementById('packagePrice').textContent = '₹' + parseInt(packagePrice).toLocaleString();
        document.getElementById('packageDuration').textContent = packageHours + ' Hour' + (packageHours > 1 ? 's' : '') + ' Validity';

        if (!userId) {
            window.location.href = 'index.html';
        }

        function goBack() {
            window.location.href = 'packages.html';
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = isError ? 'toast toast-error show' : 'toast toast-success show';
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function selectMethod(method) {
            selectedMethod = method;
            
            document.querySelectorAll('.payment-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.method === method) {
                    tab.classList.add('active');
                }
            });
            
            document.getElementById('upiFields').style.display = method === 'upi' ? 'block' : 'none';
            document.getElementById('bkashFields').style.display = method === 'bkash' ? 'block' : 'none';
            document.getElementById('usdtFields').style.display = method === 'usdt' ? 'block' : 'none';
        }

        function loadPaymentNumbers() {
            // Load UPI numbers
            db.ref('paymentMethods/upi/numbers').once('value').then(snapshot => {
                const numbers = snapshot.val();
                if (numbers) {
                    const activeNumber = Object.values(numbers).find(n => n.isActive !== false);
                    if (activeNumber) {
                        currentUpiAddress = activeNumber.number;
                        document.getElementById('upiAddress').textContent = activeNumber.number;
                    } else {
                        document.getElementById('upiAddress').textContent = 'No active UPI ID';
                    }
                } else {
                    document.getElementById('upiAddress').textContent = 'No UPI ID configured';
                }
            });
            
            // Load Bkash numbers
            db.ref('paymentMethods/bkash/numbers').once('value').then(snapshot => {
                const numbers = snapshot.val();
                if (numbers) {
                    const activeNumber = Object.values(numbers).find(n => n.isActive !== false);
                    if (activeNumber) {
                        currentBkashAddress = activeNumber.number;
                        document.getElementById('bkashAddress').textContent = activeNumber.number;
                    } else {
                        document.getElementById('bkashAddress').textContent = 'No active Bkash number';
                    }
                } else {
                    document.getElementById('bkashAddress').textContent = 'No Bkash number configured';
                }
            });
            
            // Load USDT addresses
            db.ref('paymentMethods/usdt/numbers').once('value').then(snapshot => {
                const numbers = snapshot.val();
                if (numbers) {
                    const activeAddress = Object.values(numbers).find(n => n.isActive !== false);
                    if (activeAddress) {
                        currentUsdtAddress = activeAddress.number;
                        document.getElementById('usdtAddress').textContent = activeAddress.number;
                    } else {
                        document.getElementById('usdtAddress').textContent = 'No active USDT address';
                    }
                } else {
                    document.getElementById('usdtAddress').textContent = 'No USDT address configured';
                }
            });
        }

        // FIXED COPY FUNCTION
        function copyAddress(method) {
            let address = '';
            let btnId = '';
            
            if (method === 'upi') {
                address = document.getElementById('upiAddress').textContent;
                btnId = 'copyUpiBtn';
            } else if (method === 'bkash') {
                address = document.getElementById('bkashAddress').textContent;
                btnId = 'copyBkashBtn';
            } else {
                address = document.getElementById('usdtAddress').textContent;
                btnId = 'copyUsdtBtn';
            }
            
            if (!address || address === 'Loading...' || address.includes('No active') || address.includes('No UPI') || address.includes('No Bkash') || address.includes('No USDT')) {
                showToast('Payment address not available', true);
                return;
            }
            
            // Modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(address).then(() => {
                    showToast('✅ Address copied to clipboard!');
                    let btn = document.getElementById(btnId);
                    let originalText = btn.innerHTML;
                    btn.innerHTML = '✅ Copied!';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                    }, 2000);
                }).catch(() => {
                    fallbackCopy(address, btnId);
                });
            } else {
                fallbackCopy(address, btnId);
            }
        }

        function fallbackCopy(address, btnId) {
            const textarea = document.createElement('textarea');
            textarea.value = address;
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            
            try {
                document.execCommand('copy');
                showToast('✅ Address copied to clipboard!');
                let btn = document.getElementById(btnId);
                let originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            } catch (err) {
                showToast('Failed to copy, please copy manually', true);
            }
            document.body.removeChild(textarea);
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('uploadPreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.querySelector('.upload-icon').style.display = 'none';
                document.querySelector('.upload-text').textContent = 'Click to change screenshot';
            };
            reader.readAsDataURL(file);
        }

        function convertImageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function submitPayment() {
            const userName = document.getElementById('userName').value.trim();
            const userPhone = document.getElementById('userPhone').value.trim();
            
            if (!userName) {
                showToast('Please enter your name', true);
                return;
            }
            if (!userPhone) {
                showToast('Please enter your phone number', true);
                return;
            }
            
            let transactionId = '';
            
            if (selectedMethod === 'upi') {
                const upiId = document.getElementById('userUpiId').value.trim();
                transactionId = document.getElementById('transactionId').value.trim();
                if (!upiId) {
                    showToast('Please enter your UPI ID', true);
                    return;
                }
                if (!transactionId) {
                    showToast('Please enter transaction ID', true);
                    return;
                }
            } else if (selectedMethod === 'bkash') {
                const bkashNumber = document.getElementById('userBkashNumber').value.trim();
                transactionId = document.getElementById('bkashTransactionId').value.trim();
                if (!bkashNumber) {
                    showToast('Please enter your Bkash number', true);
                    return;
                }
                if (!transactionId) {
                    showToast('Please enter transaction ID', true);
                    return;
                }
            }
            
            if (!selectedFile) {
                showToast('Please upload payment screenshot', true);
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            
            try {
                const imageBase64 = await convertImageToBase64(selectedFile);
                
                const paymentData = {
                    userId: userId,
                    userName: userName,
                    userPhone: userPhone,
                    packageName: packageName,
                    amount: parseInt(packagePrice),
                    hours: parseInt(packageHours),
                    method: selectedMethod,
                    status: 'pending',
                    createdAt: Date.now()
                };
                
                if (selectedMethod === 'upi') {
                    paymentData.userUpiId = document.getElementById('userUpiId').value.trim();
                    paymentData.transactionId = document.getElementById('transactionId').value.trim();
                } else if (selectedMethod === 'bkash') {
                    paymentData.userBkashNumber = document.getElementById('userBkashNumber').value.trim();
                    paymentData.transactionId = document.getElementById('bkashTransactionId').value.trim();
                }
                
                paymentData.screenshot = imageBase64;
                
                await db.ref('packagePayments').push(paymentData);
                await db.ref('users/' + userId + '/activity').push({
                    text: `📦 Package purchase request: ${packageName} - ₹${parseInt(packagePrice).toLocaleString()}`,
                    time: Date.now()
                });
                
                showToast('✅ Payment request submitted! Admin will verify.');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2500);
                
            } catch (error) {
                console.error('Error:', error);
                showToast('Error: ' + error.message, true);
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        }

        loadPaymentNumbers();
    </script>
</body>
</html>
