<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Package Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0a0b14;
            --card: #141827;
            --border: #1e2240;
            --input: #0d1020;
            --blue: #448AFF;
            --text: #ffffff;
            --text2: #bcc6e0;
            --text3: #8899cc;
            --text4: #5a6a99;
            --green: #2ed573;
            --red: #ff4757;
            --orange: #ffa502;
            --gold: #FFD700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 30px;
        }
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background: rgba(68,138,255,0.1);
            border: 1px solid rgba(68,138,255,0.2);
            color: var(--blue);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header h1 { font-size: 16px; font-weight: 800; }
        .header h1 span { color: var(--gold); }
        .main-content { padding: 16px; max-width: 500px; margin: 0 auto; }
        .package-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        .package-name { font-size: 22px; font-weight: 800; color: var(--gold); margin-bottom: 10px; }
        .package-price { font-size: 36px; font-weight: 800; color: var(--blue); margin-bottom: 5px; }
        .package-duration { font-size: 12px; color: var(--text3); }
        .payment-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .payment-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text3);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .payment-tab.active { background: var(--blue); color: white; }
        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i { color: var(--blue); }
        .form-group { margin-bottom: 16px; }
        .form-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 14px;
            background: var(--input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .form-input:focus { border-color: var(--blue); }
        .address-box {
            background: var(--input);
            border: 1px solid var(--blue);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .address-text { font-family: monospace; font-size: 12px; color: var(--blue); word-break: break-all; flex: 1; }
        .copy-address {
            background: rgba(68,138,255,0.15);
            border: 1px solid var(--blue);
            color: var(--blue);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        .upload-area {
            background: var(--input);
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-icon { font-size: 32px; color: var(--text3); margin-bottom: 8px; }
        .upload-text { font-size: 12px; color: var(--text3); }
        .upload-preview {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 10px;
            margin-top: 12px;
            display: none;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--green), #00b894);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: inline-block; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            display: none;
        }
        .status-card.show { display: block; animation: fadeIn 0.3s ease; }
        .status-icon { width: 70px; height: 70px; background: rgba(255,165,2,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .status-icon i { font-size: 32px; color: var(--orange); }
        .status-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .status-message { color: var(--text3); font-size: 13px; margin-bottom: 15px; }
        .status-spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top: 3px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; }
        .status-btn { background: var(--blue); border: none; border-radius: 30px; padding: 8px 20px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 600; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast-success { background: var(--green); color: white; }
        .toast-error { background: var(--red); color: white; }
        .contact-note { text-align: center; font-size: 10px; color: var(--text4); margin-top: 10px; }
        .contact-note a { color: var(--blue); text-decoration: none; }
        @media (max-width: 450px) { .package-price { font-size: 28px; } }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <h1><span>PACKAGE</span> PAYMENT</h1>
    </div>
    <div class="toast" id="toast"></div>

    <div class="main-content" id="paymentFormContainer">
        <div class="package-card">
            <div class="package-name" id="packageName">Loading...</div>
            <div class="package-price" id="packagePrice">₹0</div>
            <div class="package-duration" id="packageDuration">-</div>
        </div>

        <div class="payment-tabs">
            <button class="payment-tab active" data-method="upi" onclick="selectMethod('upi')">UPI</button>
            <button class="payment-tab" data-method="bkash" onclick="selectMethod('bkash')">Bkash</button>
            <button class="payment-tab" data-method="usdt" onclick="selectMethod('usdt')">USDT</button>
        </div>

        <div class="form-card">
            <div class="section-title"><i class="fas fa-user-circle"></i> Your Details</div>
            <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="userName" placeholder="Enter your full name"></div>
            <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-input" id="userPhone" placeholder="Enter your phone number"></div>

            <div id="upiFields">
                <div class="form-group"><label class="form-label">Your UPI ID</label><input type="text" class="form-input" id="userUpiId" placeholder="username@okhdfcbank"></div>
                <div class="section-title"><i class="fas fa-building"></i> Send Payment To</div>
                <div class="address-box"><span class="address-text" id="upiAddress">Loading...</span><button class="copy-address" onclick="copyAddress('upi')">Copy</button></div>
                <div class="form-group"><label class="form-label">Transaction ID / UTR</label><input type="text" class="form-input" id="transactionId" placeholder="Enter transaction ID"></div>
            </div>

            <div id="bkashFields" style="display:none;">
                <div class="form-group"><label class="form-label">Your Bkash Number</label><input type="tel" class="form-input" id="userBkashNumber" placeholder="01XXXXXXXXX"></div>
                <div class="section-title"><i class="fas fa-building"></i> Send Payment To</div>
                <div class="address-box"><span class="address-text" id="bkashAddress">Loading...</span><button class="copy-address" onclick="copyAddress('bkash')">Copy</button></div>
                <div class="form-group"><label class="form-label">Transaction ID / Reference No</label><input type="text" class="form-input" id="bkashTransactionId" placeholder="Enter transaction ID"></div>
            </div>

            <div id="usdtFields" style="display:none;">
                <div class="section-title"><i class="fas fa-wallet"></i> Send Payment To (USDT TRC20)</div>
                <div class="address-box"><span class="address-text" id="usdtAddress">Loading...</span><button class="copy-address" onclick="copyAddress('usdt')">Copy</button></div>
            </div>

            <div class="section-title"><i class="fas fa-camera"></i> Payment Screenshot</div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="upload-text">Click to upload payment screenshot</div>
                <img class="upload-preview" id="uploadPreview">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(event)">
            <button class="submit-btn" id="submitBtn" onclick="submitPayment()"><span class="btn-text">💰 SUBMIT PAYMENT</span><span class="spinner"></span></button>
        </div>
        <div class="contact-note">Need help? <a href="https://t.me/+CNJHfpdP1ck0NDA1" target="_blank">Contact Support</a></div>
    </div>

    <div class="main-content" id="statusContainer" style="display:none;">
        <div class="status-card" id="statusCard">
            <div class="status-icon"><i class="fas fa-hourglass-half"></i></div>
            <div class="status-title">Payment Submitted</div>
            <div class="status-message" id="statusMessage">Waiting for admin approval...</div>
            <div class="status-spinner"></div>
            <button class="status-btn" onclick="checkStatusManually()">Refresh Status</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7UVJOB_jWbPuRAqkVXJfq4MgOYUS8hds",
            authDomain: "revo-fixer-18514.firebaseapp.com",
            databaseURL: "https://revo-fixer-18514-default-rtdb.firebaseio.com",
            projectId: "revo-fixer-18514",
            storageBucket: "revo-fixer-18514.firebasestorage.app",
            messagingSenderId: "556764878482",
            appId: "1:556764878482:web:ba5c72a25db0127572384b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // No login check – use device ID for tracking
        function getDeviceId() {
            let deviceId = localStorage.getItem('deviceId');
            if (!deviceId) {
                deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('deviceId', deviceId);
            }
            return deviceId;
        }
        const deviceId = getDeviceId();

        const packageName = localStorage.getItem('selectedPackage') || '1 Hour Package';
        const packagePrice = localStorage.getItem('selectedPrice') || '2000';
        const packageHours = localStorage.getItem('selectedHours') || '1';
        document.getElementById('packageName').textContent = packageName;
        document.getElementById('packagePrice').textContent = '₹' + parseInt(packagePrice).toLocaleString();
        document.getElementById('packageDuration').textContent = packageHours + ' Hour' + (packageHours > 1 ? 's' : '') + ' Validity';

        let selectedMethod = 'upi';
        let selectedFile = null;
        let paymentRequestId = null;
        let statusListener = null;

        function goBack() { window.location.href = 'packages.html'; }
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = isError ? 'toast toast-error show' : 'toast toast-success show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.payment-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.payment-tab[data-method="${method}"]`).classList.add('active');
            document.getElementById('upiFields').style.display = method === 'upi' ? 'block' : 'none';
            document.getElementById('bkashFields').style.display = method === 'bkash' ? 'block' : 'none';
            document.getElementById('usdtFields').style.display = method === 'usdt' ? 'block' : 'none';
        }

        function loadPaymentNumbers() {
            db.ref('paymentMethods/upi/numbers').once('value').then(s => {
                if(s.exists()) { let a = Object.values(s.val()).find(n => n.isActive !== false); if(a) document.getElementById('upiAddress').textContent = a.number; else document.getElementById('upiAddress').textContent = 'No active UPI ID'; }
                else document.getElementById('upiAddress').textContent = 'No UPI ID configured';
            });
            db.ref('paymentMethods/bkash/numbers').once('value').then(s => {
                if(s.exists()) { let a = Object.values(s.val()).find(n => n.isActive !== false); if(a) document.getElementById('bkashAddress').textContent = a.number; else document.getElementById('bkashAddress').textContent = 'No active Bkash number'; }
                else document.getElementById('bkashAddress').textContent = 'No Bkash number configured';
            });
            db.ref('paymentMethods/usdt/numbers').once('value').then(s => {
                if(s.exists()) { let a = Object.values(s.val()).find(n => n.isActive !== false); if(a) document.getElementById('usdtAddress').textContent = a.number; else document.getElementById('usdtAddress').textContent = 'No active USDT address'; }
                else document.getElementById('usdtAddress').textContent = 'No USDT address configured';
            });
        }
        function copyAddress(method) {
            let address = method === 'upi' ? document.getElementById('upiAddress').textContent : (method === 'bkash' ? document.getElementById('bkashAddress').textContent : document.getElementById('usdtAddress').textContent);
            if(address && !address.includes('No active') && !address.includes('No UPI')) { navigator.clipboard.writeText(address); showToast('✅ Address copied!'); }
            else showToast('Address not available', true);
        }
        function previewImage(e) {
            const file = e.target.files[0];
            if(!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('uploadPreview').src = ev.target.result;
                document.getElementById('uploadPreview').style.display = 'block';
                document.querySelector('.upload-icon').style.display = 'none';
                document.querySelector('.upload-text').textContent = 'Click to change';
            };
            reader.readAsDataURL(file);
        }
        function convertImageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function startListening(requestId) {
            if(statusListener) statusListener.off();
            const reqRef = db.ref(`packagePayments/${requestId}`);
            statusListener = reqRef.on('value', (snap) => {
                if(snap.exists()) {
                    const status = snap.val().status;
                    if(status === 'approved') {
                        showToast('✅ Payment approved! Redirecting to dashboard...');
                        localStorage.setItem('userId', deviceId);
                        setTimeout(() => window.location.href = 'dashboard.html', 1500);
                    } else if(status === 'rejected') {
                        showToast('❌ Payment rejected. Please try again.', true);
                        // Hide status card, show form again
                        document.getElementById('statusContainer').style.display = 'none';
                        document.getElementById('paymentFormContainer').style.display = 'block';
                        if(statusListener) statusListener.off();
                    }
                }
            });
        }

        async function submitPayment() {
            const userName = document.getElementById('userName').value.trim();
            const userPhone = document.getElementById('userPhone').value.trim();
            if(!userName || !userPhone) { showToast('Please fill all fields', true); return; }
            let transactionId = '';
            if(selectedMethod === 'upi') {
                const upiId = document.getElementById('userUpiId').value.trim();
                transactionId = document.getElementById('transactionId').value.trim();
                if(!upiId || !transactionId) { showToast('Please fill UPI ID and Transaction ID', true); return; }
            } else if(selectedMethod === 'bkash') {
                const bkashNum = document.getElementById('userBkashNumber').value.trim();
                transactionId = document.getElementById('bkashTransactionId').value.trim();
                if(!bkashNum || !transactionId) { showToast('Please fill Bkash number and Transaction ID', true); return; }
            }
            if(!selectedFile) { showToast('Please upload screenshot', true); return; }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const imageBase64 = await convertImageToBase64(selectedFile);
                const paymentData = {
                    deviceId: deviceId,
                    userName: userName,
                    userPhone: userPhone,
                    packageName: packageName,
                    amount: parseInt(packagePrice),
                    hours: parseInt(packageHours),
                    method: selectedMethod,
                    status: 'pending',
                    createdAt: Date.now(),
                    transactionId: transactionId || null
                };
                if(selectedMethod === 'upi') paymentData.userUpiId = document.getElementById('userUpiId').value.trim();
                if(selectedMethod === 'bkash') paymentData.userBkashNumber = document.getElementById('userBkashNumber').value.trim();
                paymentData.screenshot = imageBase64;
                const newRef = await db.ref('packagePayments').push(paymentData);
                paymentRequestId = newRef.key;
                // Show status card
                document.getElementById('paymentFormContainer').style.display = 'none';
                document.getElementById('statusContainer').style.display = 'block';
                document.getElementById('statusMessage').innerHTML = `Payment request submitted.<br>ID: ${paymentRequestId.substring(0,8)}...<br>Waiting for admin approval.`;
                startListening(paymentRequestId);
            } catch(err) {
                showToast('Error: '+err.message, true);
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        }

        function checkStatusManually() {
            if(paymentRequestId) {
                db.ref(`packagePayments/${paymentRequestId}`).once('value').then(snap => {
                    if(snap.exists()) {
                        const status = snap.val().status;
                        if(status === 'approved') {
                            showToast('Approved! Redirecting...');
                            localStorage.setItem('userId', deviceId);
                            setTimeout(() => window.location.href = 'dashboard.html', 1500);
                        } else if(status === 'rejected') {
                            showToast('Payment rejected. Please try again.', true);
                            document.getElementById('statusContainer').style.display = 'none';
                            document.getElementById('paymentFormContainer').style.display = 'block';
                        } else showToast('Still pending. Please wait.');
                    }
                });
            }
        }

        loadPaymentNumbers();
        // Ensure first tab is active
        selectMethod('upi');
    </script>
</body>
</html>
