<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #0a0b14; --card: #141827; --border: #1e2240;
            --input: #0d1020; --blue: #448AFF; --text: #ffffff;
            --text2: #bcc6e0; --text3: #8899cc; --text4: #5a6a99;
            --green: #2ed573; --red: #ff4757; --orange: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding-bottom: 40px;
        }

        .header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 14px 20px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .back-btn {
            background: rgba(68,138,255,0.1); border: 1px solid rgba(68,138,255,0.2);
            color: var(--blue); width: 38px; height: 38px; border-radius: 8px;
            cursor: pointer; font-size: 17px; display: flex;
            align-items: center; justify-content: center; transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(68,138,255,0.2); }
        .header h1 { font-size: 17px; font-weight: 800; }
        .header h1 span { color: var(--blue); }

        .main-content { padding: 20px; max-width: 450px; margin: 0 auto; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 24px; margin-bottom: 16px;
        }

        .amount-display {
            text-align: center; padding: 16px;
            background: rgba(68,138,255,0.05); border: 1px solid rgba(68,138,255,0.1);
            border-radius: 12px; margin-bottom: 20px;
        }
        .amount-label { font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }
        .amount-value { font-size: 28px; font-weight: 800; color: var(--blue); }
        .amount-method { font-size: 12px; color: var(--text2); margin-top: 3px; text-transform: uppercase; }

        .section-title {
            font-size: 12px; font-weight: 700; color: var(--text);
            margin-bottom: 12px; margin-top: 18px;
            display: flex; align-items: center; gap: 6px;
        }
        .section-title i { color: var(--blue); }

        .form-group { margin-bottom: 14px; }
        .form-label {
            font-size: 10px; font-weight: 700; color: var(--text3);
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 6px; display: block;
        }
        .form-input {
            width: 100%; padding: 13px 16px; background: var(--input);
            border: 2px solid var(--border); border-radius: 10px;
            color: var(--text); font-size: 14px; outline: none;
            transition: all 0.3s;
        }
        .form-input:focus { border-color: var(--blue); }
        .form-input::placeholder { color: #3a4060; }

        .address-box {
            background: var(--input); border: 2px solid var(--blue);
            border-radius: 10px; padding: 14px 16px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 10px;
            word-break: break-all; font-size: 13px; color: var(--blue);
            font-family: 'Courier New', monospace;
        }
        .address-box span { flex: 1; }
        .copy-btn {
            background: var(--blue); border: none; color: #fff;
            padding: 8px 14px; border-radius: 6px; font-size: 11px;
            font-weight: 700; cursor: pointer; white-space: nowrap;
            transition: all 0.3s; flex-shrink: 0;
        }
        .copy-btn:hover { background: #2962FF; }

        .upload-area {
            background: var(--input); border: 2px dashed var(--border);
            border-radius: 12px; padding: 24px; text-align: center;
            cursor: pointer; transition: all 0.3s; margin-bottom: 16px;
        }
        .upload-area:hover { border-color: var(--blue); background: rgba(68,138,255,0.03); }
        .upload-icon { font-size: 30px; color: var(--text3); margin-bottom: 8px; }
        .upload-text { font-size: 12px; color: var(--text3); }
        .upload-preview {
            width: 100%; max-height: 200px; object-fit: contain;
            border-radius: 8px; margin-top: 10px; display: none;
        }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 14px; font-weight: 700; letter-spacing: 1.5px;
            cursor: pointer; text-transform: uppercase; transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #2962FF);
            color: #fff; box-shadow: 0 6px 20px rgba(68,138,255,0.3);
            margin-top: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:disabled { background: #1e2240; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast-el {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px; display: flex; align-items: center;
            gap: 10px; animation: slideIn 0.3s ease; min-width: 260px;
        }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        .toast-el.success { border-left: 4px solid var(--green); }
        .toast-el.error { border-left: 4px solid var(--red); }
        .toast-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; color: #fff; }
        .toast-el.success .toast-icon { background: var(--green); }
        .toast-el.error .toast-icon { background: var(--red); }
        .toast-title { font-weight: 600; font-size: 12px; }
        .toast-msg { font-size: 11px; color: var(--text2); margin-top: 1px; }

        @media (max-width: 400px) {
            .card { padding: 18px 14px; }
            .amount-value { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <h1><span id="methodTitle">UPI</span> PAYMENT</h1>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="main-content">
        <div class="card">
            
            <div class="amount-display">
                <div class="amount-label">Amount to Pay</div>
                <div class="amount-value" id="displayAmount">₹0</div>
                <div class="amount-method" id="displayMethod">UPI</div>
            </div>

            <!-- UPI FORM -->
            <div id="upiForm">
                <div class="section-title"><i class="fas fa-user-edit"></i> Your Details</div>
                
                <div class="form-group">
                    <label class="form-label">Your UPI ID</label>
                    <input type="text" class="form-input" id="userUpiId" placeholder="e.g., username@okhdfc">
                </div>
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-input" id="userUpiName" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-input" id="userPhone" placeholder="Enter phone number">
                </div>

                <div class="section-title"><i class="fas fa-building"></i> Pay to</div>
                <div id="upiAddressContainer">
                    <div class="address-box">
                        <span id="adminUpiId">Loading...</span>
                        <button class="copy-btn" id="copyUpiBtn" onclick="copyAddress('upi')">📋 Copy</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Transaction ID / UTR Number</label>
                    <input type="text" class="form-input" id="transactionId" placeholder="Enter UTR/Transaction ID">
                </div>
            </div>

            <!-- BKASH FORM -->
            <div id="bkashForm" style="display:none;">
                <div class="section-title"><i class="fas fa-user-edit"></i> Your Details</div>
                
                <div class="form-group">
                    <label class="form-label">Your Bkash Number</label>
                    <input type="tel" class="form-input" id="userBkashNumber" placeholder="e.g., 01XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-input" id="userBkashName" placeholder="Enter your name">
                </div>

                <div class="section-title"><i class="fas fa-building"></i> Send Payment to</div>
                <div id="bkashAddressContainer">
                    <div class="address-box">
                        <span id="adminBkashNumber">Loading...</span>
                        <button class="copy-btn" id="copyBkashBtn" onclick="copyAddress('bkash')">📋 Copy</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Transaction ID / Reference No</label>
                    <input type="text" class="form-input" id="bkashTransactionId" placeholder="Enter transaction ID">
                </div>
            </div>

            <!-- USDT FORM -->
            <div id="usdtForm" style="display:none;">
                <div class="section-title"><i class="fas fa-wallet"></i> USDT TRC20 Wallet</div>
                <div id="usdtAddressContainer">
                    <div class="address-box">
                        <span id="adminUsdtAddress">Loading...</span>
                        <button class="copy-btn" id="copyUsdtBtn" onclick="copyAddress('usdt')">📋 Copy</button>
                    </div>
                </div>
            </div>

            <!-- SCREENSHOT -->
            <div class="section-title"><i class="fas fa-camera"></i> Payment Screenshot</div>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="upload-text">Click to upload payment screenshot</div>
                <img class="upload-preview" id="uploadPreview">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(event)">

            <button class="btn btn-primary" id="submitBtn" onclick="submitPayment()">
                📤 SUBMIT PAYMENT
            </button>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7UVJOB_jWbPuRAqkVXJfq4MgOYUS8hds",
            authDomain: "revo-fixer-18514.firebaseapp.com",
            databaseURL: "https://revo-fixer-18514-default-rtdb.firebaseio.com",
            projectId: "revo-fixer-18514",
            storageBucket: "revo-fixer-18514.firebasestorage.app",
            messagingSenderId: "556764878482",
            appId: "1:556764878482:web:ba5c72a25db0127572384b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = 'index.html';
        }

        const amount = localStorage.getItem('depositAmount') || '0';
        const method = localStorage.getItem('depositMethod') || 'upi';
        const currency = localStorage.getItem('depositCurrency') || 'INR';
        let selectedFile = null;
        let currentAddress = '';

        let symbol = method === 'bkash' ? '৳' : (method === 'usdt' ? '$' : '₹');
        document.getElementById('displayAmount').textContent = symbol + parseInt(amount).toLocaleString();
        document.getElementById('displayMethod').textContent = method.toUpperCase();
        document.getElementById('methodTitle').textContent = method.toUpperCase();

        if (method === 'upi') {
            document.getElementById('upiForm').style.display = 'block';
            document.getElementById('bkashForm').style.display = 'none';
            document.getElementById('usdtForm').style.display = 'none';
            loadPaymentNumbers('upi', 'adminUpiId');
        } else if (method === 'bkash') {
            document.getElementById('upiForm').style.display = 'none';
            document.getElementById('bkashForm').style.display = 'block';
            document.getElementById('usdtForm').style.display = 'none';
            loadPaymentNumbers('bkash', 'adminBkashNumber');
        } else {
            document.getElementById('upiForm').style.display = 'none';
            document.getElementById('bkashForm').style.display = 'none';
            document.getElementById('usdtForm').style.display = 'block';
            loadPaymentNumbers('usdt', 'adminUsdtAddress');
        }

        function goBack() {
            window.location.href = 'deposit.html';
        }

        function showToast(type, title, msg) {
            const container = document.getElementById('toastContainer');
            const id = 'toast_' + Date.now();
            container.innerHTML += `<div class="toast-el ${type}" id="${id}">
                <div class="toast-icon">${type === 'success' ? '✓' : '✕'}</div>
                <div>
                    <div class="toast-title">${title}</div>
                    <div class="toast-msg">${msg}</div>
                </div>
            </div>`;
            setTimeout(() => {
                const el = document.getElementById(id);
                if(el) el.remove();
            }, 4000);
        }

        function loadPaymentNumbers(methodType, elementId) {
            db.ref(`paymentMethods/${methodType}/numbers`).once('value').then((snapshot) => {
                const numbers = snapshot.val();
                const container = document.getElementById(elementId);
                
                if (!numbers || Object.keys(numbers).length === 0) {
                    container.textContent = 'No payment method configured. Contact support.';
                    return;
                }
                
                let activeNumber = null;
                for (const [id, data] of Object.entries(numbers)) {
                    if (data.isActive !== false) {
                        activeNumber = data;
                        break;
                    }
                }
                
                if (activeNumber) {
                    container.textContent = activeNumber.number;
                    currentAddress = activeNumber.number;
                } else {
                    container.textContent = 'No active payment method. Contact support.';
                }
            }).catch((error) => {
                console.error('Error loading payment numbers:', error);
                document.getElementById(elementId).textContent = 'Error loading. Contact support.';
            });
        }

        // SIMPLE COPY FUNCTION - 100% WORKING
        function copyAddress(methodType) {
            let text = '';
            if (methodType === 'upi') {
                text = document.getElementById('adminUpiId').textContent;
            } else if (methodType === 'bkash') {
                text = document.getElementById('adminBkashNumber').textContent;
            } else {
                text = document.getElementById('adminUsdtAddress').textContent;
            }
            
            if (!text || text === 'Loading...' || text.includes('No active') || text.includes('Error')) {
                showToast('error', 'Error', 'Payment address not available');
                return;
            }
            
            // Method 1: Modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('success', 'Copied!', 'Address copied to clipboard');
                    // Change button text temporarily
                    let btnId = methodType === 'upi' ? 'copyUpiBtn' : (methodType === 'bkash' ? 'copyBkashBtn' : 'copyUsdtBtn');
                    let btn = document.getElementById(btnId);
                    let originalText = btn.innerHTML;
                    btn.innerHTML = '✅ Copied!';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                    }, 2000);
                }).catch(() => {
                    fallbackCopy(text, methodType);
                });
            } else {
                fallbackCopy(text, methodType);
            }
        }

        function fallbackCopy(text, methodType) {
            // Method 2: Create temporary textarea
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            
            try {
                document.execCommand('copy');
                showToast('success', 'Copied!', 'Address copied to clipboard');
                let btnId = methodType === 'upi' ? 'copyUpiBtn' : (methodType === 'bkash' ? 'copyBkashBtn' : 'copyUsdtBtn');
                let btn = document.getElementById(btnId);
                let originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            } catch (err) {
                showToast('error', 'Failed', 'Please copy manually');
            }
            document.body.removeChild(textarea);
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('uploadPreview').src = e.target.result;
                document.getElementById('uploadPreview').style.display = 'block';
                document.querySelector('.upload-icon').style.display = 'none';
                document.querySelector('.upload-text').textContent = 'Click to change screenshot';
            };
            reader.readAsDataURL(file);
        }

        function convertImageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function submitPayment() {
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            if (method === 'upi') {
                const upiId = document.getElementById('userUpiId').value.trim();
                const upiName = document.getElementById('userUpiName').value.trim();
                const phone = document.getElementById('userPhone').value.trim();
                const txnId = document.getElementById('transactionId').value.trim();
                
                if (!upiId) { showToast('error', 'Required', 'Enter your UPI ID'); return; }
                if (!upiName) { showToast('error', 'Required', 'Enter your name'); return; }
                if (!phone) { showToast('error', 'Required', 'Enter phone number'); return; }
                if (!txnId) { showToast('error', 'Required', 'Enter Transaction ID'); return; }
            }
            
            if (method === 'bkash') {
                const bkashNumber = document.getElementById('userBkashNumber').value.trim();
                const bkashName = document.getElementById('userBkashName').value.trim();
                const txnId = document.getElementById('bkashTransactionId').value.trim();
                
                if (!bkashNumber) { showToast('error', 'Required', 'Enter your Bkash number'); return; }
                if (!bkashName) { showToast('error', 'Required', 'Enter your name'); return; }
                if (!txnId) { showToast('error', 'Required', 'Enter Transaction ID'); return; }
            }
            
            if (!selectedFile) {
                showToast('error', 'Required', 'Upload payment screenshot');
                return;
            }
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;
            
            try {
                const imageBase64 = await convertImageToBase64(selectedFile);
                const userSnapshot = await db.ref('users/' + userId).once('value');
                const userData = userSnapshot.val() || {};
                
                const paymentData = {
                    userId: userId,
                    username: userData.username || 'User',
                    amount: parseInt(amount),
                    currency: currency,
                    method: method,
                    status: 'pending',
                    createdAt: Date.now(),
                    screenshot: imageBase64
                };
                
                if (method === 'upi') {
                    paymentData.userUpiId = document.getElementById('userUpiId').value.trim();
                    paymentData.userName = document.getElementById('userUpiName').value.trim();
                    paymentData.userPhone = document.getElementById('userPhone').value.trim();
                    paymentData.transactionId = document.getElementById('transactionId').value.trim();
                } else if (method === 'bkash') {
                    paymentData.userBkashNumber = document.getElementById('userBkashNumber').value.trim();
                    paymentData.userName = document.getElementById('userBkashName').value.trim();
                    paymentData.transactionId = document.getElementById('bkashTransactionId').value.trim();
                }
                
                await db.ref('paymentRequests').push(paymentData);
                await db.ref('users/' + userId + '/activity').push({
                    text: `💰 Payment request submitted: ${symbol}${parseInt(amount).toLocaleString()} via ${method.toUpperCase()}`,
                    time: Date.now()
                });
                
                localStorage.removeItem('depositAmount');
                localStorage.removeItem('depositMethod');
                localStorage.removeItem('depositCurrency');
                
                showToast('success', 'Submitted!', 'Payment request sent. Admin will verify.');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                showToast('error', 'Failed', error.message || 'Please try again');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
