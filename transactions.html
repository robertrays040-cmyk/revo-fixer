<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Transactions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #0a0b14;
            --card: #141827;
            --border: #1e2240;
            --input: #0d1020;
            --blue: #448AFF;
            --text: #ffffff;
            --text2: #bcc6e0;
            --text3: #8899cc;
            --text4: #5a6a99;
            --green: #2ed573;
            --red: #ff4757;
            --orange: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background: rgba(68,138,255,0.1);
            border: 1px solid rgba(68,138,255,0.2);
            color: var(--blue);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(68,138,255,0.2);
        }
        .header h1 {
            font-size: 16px;
            font-weight: 800;
        }
        .header h1 span {
            color: var(--blue);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, var(--card), var(--input));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-label {
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .balance-amount {
            font-size: 36px;
            font-weight: 800;
            color: var(--blue);
            margin-top: 5px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--card);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .filter-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text3);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: var(--blue);
            color: white;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
        }
        .stat-label {
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--blue);
            margin-top: 5px;
        }

        /* Transactions List */
        .transactions-list {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }
        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .transaction-item:hover {
            background: rgba(68,138,255,0.05);
        }
        .transaction-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .transaction-icon.deposit {
            background: rgba(46,213,115,0.15);
            color: var(--green);
        }
        .transaction-icon.withdraw {
            background: rgba(255,71,87,0.15);
            color: var(--red);
        }
        .transaction-icon.package {
            background: rgba(68,138,255,0.15);
            color: var(--blue);
        }
        .transaction-icon.bonus {
            background: rgba(255,165,2,0.15);
            color: var(--orange);
        }
        .transaction-details {
            flex: 1;
            margin-left: 12px;
        }
        .transaction-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .transaction-date {
            font-size: 10px;
            color: var(--text4);
        }
        .transaction-amount {
            text-align: right;
        }
        .amount-positive {
            color: var(--green);
            font-weight: 700;
        }
        .amount-negative {
            color: var(--red);
            font-weight: 700;
        }
        .transaction-status {
            font-size: 10px;
            margin-top: 4px;
        }
        .status-success {
            color: var(--green);
        }
        .status-pending {
            color: var(--orange);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text4);
        }
        .empty-state i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text4);
        }
        .loading i {
            font-size: 30px;
            margin-bottom: 10px;
        }

        @media (max-width: 450px) {
            .balance-amount { font-size: 28px; }
            .transaction-item { padding: 12px; }
            .transaction-title { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <h1><span>TRANSACTION</span> HISTORY</h1>
    </div>

    <div class="container">
        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-label">Current Balance</div>
            <div class="balance-amount" id="currentBalance">₹0</div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="deposit" onclick="setFilter('deposit')">Deposits</button>
            <button class="filter-btn" data-filter="withdraw" onclick="setFilter('withdraw')">Withdrawals</button>
            <button class="filter-btn" data-filter="package" onclick="setFilter('package')">Packages</button>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Total Deposits</div>
                <div class="stat-value" id="totalDeposits">₹0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Withdrawals</div>
                <div class="stat-value" id="totalWithdrawals">₹0</div>
            </div>
        </div>

        <!-- Transactions List -->
        <div class="transactions-list" id="transactionsList">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i><br>Loading transactions...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7UVJOB_jWbPuRAqkVXJfq4MgOYUS8hds",
            authDomain: "revo-fixer-18514.firebaseapp.com",
            databaseURL: "https://revo-fixer-18514-default-rtdb.firebaseio.com",
            projectId: "revo-fixer-18514",
            storageBucket: "revo-fixer-18514.firebasestorage.app",
            messagingSenderId: "556764878482",
            appId: "1:556764878482:web:ba5c72a25db0127572384b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = 'index.html';
        }

        let currentFilter = 'all';
        let allTransactions = [];

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                }
            });
            displayTransactions();
        }

        function loadTransactions() {
            // Load user data for balance
            db.ref('users/' + userId).on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const balance = data.balance || 0;
                    document.getElementById('currentBalance').textContent = '₹' + balance.toLocaleString();
                    document.getElementById('totalDeposits').textContent = '₹' + (data.totalDeposited || 0).toLocaleString();
                    document.getElementById('totalWithdrawals').textContent = '₹' + (data.totalWithdrawn || 0).toLocaleString();
                }
            });

            // Load transactions from paymentRequests
            db.ref('paymentRequests').orderByChild('userId').equalTo(userId).on('value', (snapshot) => {
                const payments = snapshot.val();
                
                // Load package purchases from activity
                db.ref('users/' + userId + '/activity').once('value', (activitySnap) => {
                    const activities = activitySnap.val();
                    
                    allTransactions = [];
                    
                    // Process payment requests
                    if (payments) {
                        Object.entries(payments).forEach(([id, payment]) => {
                            let type = 'deposit';
                            let title = 'Deposit Request';
                            let amount = payment.amount || 0;
                            let status = payment.status || 'pending';
                            
                            if (payment.method === 'withdraw') {
                                type = 'withdraw';
                                title = 'Withdrawal Request';
                                amount = -amount;
                            }
                            
                            allTransactions.push({
                                id: id,
                                type: type,
                                title: title,
                                amount: amount,
                                status: status,
                                timestamp: payment.createdAt || payment.timestamp,
                                method: payment.method,
                                transactionId: payment.transactionId
                            });
                        });
                    }
                    
                    // Process package purchases from activity
                    if (activities) {
                        const activityArray = Object.values(activities);
                        activityArray.forEach(activity => {
                            if (activity.text && (activity.text.includes('purchased') || activity.text.includes('Package'))) {
                                let amount = 0;
                                let match = activity.text.match(/₹(\d+)/);
                                if (match) amount = -parseInt(match[1]);
                                
                                allTransactions.push({
                                    id: activity.timestamp,
                                    type: 'package',
                                    title: 'Package Purchase',
                                    amount: amount,
                                    status: 'success',
                                    timestamp: activity.time,
                                    description: activity.text
                                });
                            }
                        });
                    }
                    
                    // Sort by timestamp (newest first)
                    allTransactions.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    
                    displayTransactions();
                });
            });
        }

        function displayTransactions() {
            const container = document.getElementById('transactionsList');
            
            let filtered = allTransactions;
            if (currentFilter !== 'all') {
                filtered = allTransactions.filter(t => t.type === currentFilter);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-receipt"></i>
                        <p>No transactions found</p>
                        <p style="font-size: 11px; margin-top: 5px;">Your transaction history will appear here</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filtered.forEach(transaction => {
                const isPositive = transaction.amount > 0;
                const amountClass = isPositive ? 'amount-positive' : 'amount-negative';
                const amountSymbol = isPositive ? '+' : '';
                
                let iconClass = '';
                let icon = '';
                
                switch (transaction.type) {
                    case 'deposit':
                        iconClass = 'deposit';
                        icon = '<i class="fas fa-arrow-down"></i>';
                        break;
                    case 'withdraw':
                        iconClass = 'withdraw';
                        icon = '<i class="fas fa-arrow-up"></i>';
                        break;
                    case 'package':
                        iconClass = 'package';
                        icon = '<i class="fas fa-gift"></i>';
                        break;
                    default:
                        iconClass = 'bonus';
                        icon = '<i class="fas fa-coins"></i>';
                }
                
                const statusClass = transaction.status === 'success' || transaction.status === 'approved' ? 'status-success' : 'status-pending';
                const statusText = transaction.status === 'success' || transaction.status === 'approved' ? 'Completed' : 
                                  transaction.status === 'pending' ? 'Pending' : transaction.status;
                
                html += `
                    <div class="transaction-item">
                        <div class="transaction-icon ${iconClass}">
                            ${icon}
                        </div>
                        <div class="transaction-details">
                            <div class="transaction-title">${transaction.title}</div>
                            <div class="transaction-date">${formatDate(transaction.timestamp)}</div>
                            ${transaction.transactionId ? `<div class="transaction-date">ID: ${transaction.transactionId}</div>` : ''}
                            <div class="transaction-status ${statusClass}">${statusText}</div>
                        </div>
                        <div class="transaction-amount">
                            <div class="${amountClass}">${amountSymbol}₹${Math.abs(transaction.amount).toLocaleString()}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Just now';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return `${diff} sec ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
            return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        // Load transactions
        loadTransactions();
    </script>
</body>
</html>
