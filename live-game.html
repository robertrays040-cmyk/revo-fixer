<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Crazy Time Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0a0b14;
            --card: #141827;
            --border: #1e2240;
            --input: #0d1020;
            --blue: #448AFF;
            --text: #ffffff;
            --text2: #bcc6e0;
            --text3: #8899cc;
            --text4: #5a6a99;
            --green: #2ed573;
            --red: #ff4757;
            --gold: #FFD700;
            --orange: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background: rgba(68,138,255,0.1);
            border: 1px solid rgba(68,138,255,0.2);
            color: var(--blue);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(68,138,255,0.2);
        }
        .header h1 {
            font-size: 16px;
            font-weight: 800;
        }
        .header h1 span {
            color: var(--blue);
        }

        /* Auto Refresh Timer */
        .auto-refresh-timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(68,138,255,0.15);
            backdrop-filter: blur(10px);
            color: var(--blue);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(68,138,255,0.3);
            z-index: 1000;
            display: none;
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: rgba(255,255,255,0.08);
            font-size: 10px;
            z-index: 100;
        }
        .watermark a {
            color: rgba(255,255,255,0.2);
            text-decoration: none;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Section */
        .hero-section {
            text-align: center;
            margin-bottom: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
        }
        .hero-section h1 {
            font-size: 22px;
            font-weight: 800;
        }
        .hero-section h1 span {
            color: var(--blue);
        }
        .hero-section p {
            font-size: 11px;
            color: var(--text3);
            margin-top: 5px;
        }

        /* Signal Container */
        .signal-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px 20px;
            margin-bottom: 20px;
        }

        .signal-label {
            text-align: center;
            color: var(--blue);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .signal-time {
            color: var(--text3);
            margin-left: 8px;
        }

        /* Live Display */
        .live-display {
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Placeholder */
        .placeholder-box {
            text-align: center;
            padding: 40px;
            background: rgba(68,138,255,0.03);
            border-radius: 20px;
            width: 100%;
            border: 1px dashed var(--border);
        }
        .placeholder-box i {
            font-size: 50px;
            color: var(--blue);
            margin-bottom: 15px;
            opacity: 0.5;
        }
        .placeholder-box .main-text {
            color: var(--blue);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .placeholder-box .sub-text {
            color: var(--text4);
            font-size: 12px;
        }

        /* Signal Card with Animation */
        .signal-card {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: shake 2.5s ease-in-out infinite, blink 1.2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-3px, -2px) rotate(-1deg); }
            20% { transform: translate(3px, 2px) rotate(1deg); }
            30% { transform: translate(-2px, 1px) rotate(-0.5deg); }
            40% { transform: translate(2px, -1px) rotate(0.5deg); }
            50% { transform: translate(-1px, 1px) rotate(-0.3deg); }
            60% { transform: translate(1px, -1px) rotate(0.3deg); }
            70% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 15px rgba(68,138,255,0.5)); }
            50% { opacity: 0.85; filter: drop-shadow(0 0 30px rgba(68,138,255,0.8)); }
        }

        .signal-image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .signal-image {
            width: 260px;
            height: 130px;
            object-fit: contain;
            transition: all 0.3s;
        }
        .signal-name {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
            margin-top: 15px;
            text-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        /* Confidence */
        .confidence-display {
            margin-top: 20px;
        }
        .confidence-text {
            font-size: 12px;
            color: var(--text3);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .confidence-text i {
            color: var(--blue);
        }
        .confidence-bar {
            width: 100%;
            height: 5px;
            background: var(--input);
            border-radius: 10px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #2962FF);
            width: 0%;
            transition: width 1s ease;
            border-radius: 10px;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #2962FF);
            color: #fff;
            box-shadow: 0 5px 15px rgba(68,138,255,0.3);
        }
        .btn-secondary {
            background: var(--input);
            border: 1px solid var(--border);
            color: var(--text2);
        }
        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-2px);
        }
        .btn-primary:active, .btn-secondary:active {
            transform: translateY(0);
        }

        /* Stats */
        .stats-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 20px;
        }
        .stats-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--blue);
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 9px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Loading */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(68,138,255,0.2);
            border-top: 3px solid var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .signal-image { width: 220px; height: 110px; }
            .signal-name { font-size: 22px; }
            .stat-value { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <h1><span>CRAZY TIME</span> LIVE</h1>
    </div>

    <div class="auto-refresh-timer" id="autoRefreshTimer">
        <i class="fas fa-sync-alt fa-spin"></i> Next: 60s
    </div>

    <div class="watermark">
        Developer <a href="https://t.me/RevoAgent" target="_blank">@RevoAgent</a>
    </div>

    <div class="container">
        <div class="hero-section">
            <h1><span>CRAZY TIME</span> REVO FIXER</h1>
            <p>⚡ Live Predictions • High Accuracy ⚡</p>
        </div>

        <div class="signal-container">
            <div class="signal-label">
                <i class="fas fa-bolt"></i> CURRENT PREDICTION
                <span class="signal-time" id="signalTime"></span>
            </div>

            <div class="live-display" id="liveDisplay">
                <div id="placeholderBox" class="placeholder-box">
                    <i class="fas fa-hand-pointer"></i>
                    <div class="main-text">Click Get Signal To Start Live Session</div>
                    <div class="sub-text">Get instant predictions</div>
                </div>

                <div id="signalCard" class="signal-card">
                    <div class="signal-image-container">
                        <img id="signalImage" class="signal-image" src="" alt="Signal">
                        <div class="signal-name" id="signalName"></div>
                    </div>
                </div>
            </div>

            <div class="confidence-display">
                <div class="confidence-text" id="confidenceText">
                    <i class="fas fa-chart-line"></i> AI Confidence: 0%
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="predictBtn">
                <i class="fas fa-magic"></i> GET SIGNAL
            </button>
            <button class="btn btn-secondary" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> REFRESH
            </button>
        </div>

        <div class="stats-container">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalPredictions">1,249</div>
                    <div class="stat-label">TOTAL</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="accuracy">94%</div>
                    <div class="stat-label">ACCURACY</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="bonusHits">128</div>
                    <div class="stat-label">BONUS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="liveUsers">1.2k</div>
                    <div class="stat-label">LIVE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game Images
        const gameImages = {
            '1': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539269/one-card_r0ffuy.png',
            '2': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539364/two-card_ayl9lu.png',
            '5': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539403/five-card_msp0cr.png',
            '10': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539416/ten-card_cx3cvj.png',
            'PACHINKO': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539441/pachiko-card_zxiw7r.png',
            'COIN FLIP': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539429/coin-flip-card_kbbg7m.png',
            'CASH HUNT': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539519/cash-hunt-card_jp8hr3.png',
            'CRAZY TIME': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539531/crazy-time-card_dftfw3.png'
        };

        const games = [
            { name: '1', imageKey: '1', confidenceRange: [85, 95] },
            { name: '2', imageKey: '2', confidenceRange: [80, 92] },
            { name: '5', imageKey: '5', confidenceRange: [75, 90] },
            { name: '10', imageKey: '10', confidenceRange: [70, 88] },
            { name: 'PACHINKO', imageKey: 'PACHINKO', confidenceRange: [60, 85] },
            { name: 'COIN FLIP', imageKey: 'COIN FLIP', confidenceRange: [68, 89] },
            { name: 'CASH HUNT', imageKey: 'CASH HUNT', confidenceRange: [65, 87] },
            { name: 'CRAZY TIME', imageKey: 'CRAZY TIME', confidenceRange: [55, 82] }
        ];

        let stats = {
            total: 1249,
            accuracy: 94,
            bonusHits: 128,
            liveUsers: 1247
        };

        let autoRefreshInterval = null;
        let autoRefreshCountdown = 60;
        let isTimerRunning = false;

        const placeholderBox = document.getElementById('placeholderBox');
        const signalCard = document.getElementById('signalCard');
        const signalImage = document.getElementById('signalImage');
        const signalName = document.getElementById('signalName');
        const confidenceText = document.getElementById('confidenceText');
        const confidenceFill = document.getElementById('confidenceFill');
        const predictBtn = document.getElementById('predictBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const autoRefreshTimer = document.getElementById('autoRefreshTimer');
        const signalTime = document.getElementById('signalTime');

        function goBack() {
            window.location.href = 'activation.html';
        }

        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            signalTime.textContent = `• ${hours}:${minutes}`;
        }

        function startAutoRefresh() {
            if (isTimerRunning && autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshCountdown = 60;
            autoRefreshTimer.style.display = 'block';
            isTimerRunning = true;

            autoRefreshInterval = setInterval(() => {
                autoRefreshCountdown--;
                autoRefreshTimer.innerHTML = `<i class="fas fa-sync-alt fa-spin"></i> Next: ${autoRefreshCountdown}s`;
                if (autoRefreshCountdown <= 0) {
                    generatePrediction();
                    autoRefreshCountdown = 60;
                }
            }, 1000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
            autoRefreshTimer.style.display = 'none';
            isTimerRunning = false;
        }

        function resetDisplay() {
            placeholderBox.style.display = 'block';
            signalCard.style.display = 'none';
            confidenceText.innerHTML = '<i class="fas fa-chart-line"></i> AI Confidence: 0%';
            confidenceFill.style.width = '0%';
        }

        function showPrediction(game, confidence) {
            const imageUrl = gameImages[game.imageKey];
            if (imageUrl) {
                signalImage.src = imageUrl;
                placeholderBox.style.display = 'none';
                signalCard.style.display = 'flex';
                signalName.textContent = game.name;
            }
            confidenceText.innerHTML = `<i class="fas fa-chart-line"></i> AI Confidence: ${confidence}%`;
            confidenceFill.style.width = confidence + '%';
        }

        function generatePrediction() {
            predictBtn.disabled = true;
            refreshBtn.disabled = true;

            placeholderBox.innerHTML = `
                <div class="loading-spinner"></div>
                <div class="main-text">Analyzing Patterns...</div>
                <div class="sub-text">Please wait</div>
            `;
            placeholderBox.style.display = 'block';
            signalCard.style.display = 'none';
            confidenceText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CALCULATING...';
            confidenceFill.style.width = '0%';

            updateTime();

            if (!isTimerRunning) {
                startAutoRefresh();
            } else {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);
                startAutoRefresh();
            }

            setTimeout(() => {
                const rand = Math.random();
                let selectedGame;
                if (rand < 0.22) selectedGame = games.find(g => g.name === '1');
                else if (rand < 0.42) selectedGame = games.find(g => g.name === '2');
                else if (rand < 0.60) selectedGame = games.find(g => g.name === '5');
                else if (rand < 0.75) selectedGame = games.find(g => g.name === '10');
                else if (rand < 0.85) selectedGame = games.find(g => g.name === 'PACHINKO');
                else if (rand < 0.92) selectedGame = games.find(g => g.name === 'COIN FLIP');
                else if (rand < 0.97) selectedGame = games.find(g => g.name === 'CASH HUNT');
                else selectedGame = games.find(g => g.name === 'CRAZY TIME');

                const confidence = Math.floor(Math.random() * (selectedGame.confidenceRange[1] - selectedGame.confidenceRange[0] + 1)) + selectedGame.confidenceRange[0];

                showPrediction(selectedGame, confidence);

                stats.total += 1;
                if (['PACHINKO', 'COIN FLIP', 'CASH HUNT', 'CRAZY TIME'].includes(selectedGame.name)) {
                    stats.bonusHits += 1;
                }
                const accuracyChange = Math.random() > 0.7 ? -1 : 1;
                stats.accuracy = Math.max(85, Math.min(98, stats.accuracy + accuracyChange));

                document.getElementById('totalPredictions').textContent = stats.total.toLocaleString();
                document.getElementById('accuracy').textContent = stats.accuracy + '%';
                document.getElementById('bonusHits').textContent = stats.bonusHits;
                document.getElementById('liveUsers').textContent = (stats.liveUsers / 1000).toFixed(1) + 'k';

                predictBtn.disabled = false;
                refreshBtn.disabled = false;
            }, 2000);
        }

        function refreshPrediction() {
            resetDisplay();
            placeholderBox.innerHTML = `
                <i class="fas fa-hand-pointer"></i>
                <div class="main-text">Click Get Signal To Start Live Session</div>
                <div class="sub-text">Get instant predictions</div>
            `;
            stopAutoRefresh();
            setTimeout(() => generatePrediction(), 300);
        }

        predictBtn.addEventListener('click', generatePrediction);
        refreshBtn.addEventListener('click', refreshPrediction);

        setInterval(() => {
            const change = Math.floor(Math.random() * 20) - 10;
            stats.liveUsers = Math.max(1000, stats.liveUsers + change);
            document.getElementById('liveUsers').textContent = (stats.liveUsers / 1000).toFixed(1) + 'k';
        }, 8000);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            } else {
                if (isTimerRunning) startAutoRefresh();
            }
        });

        resetDisplay();
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
