<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #0a0b14;
            --card: #141827;
            --border: #1e2240;
            --input: #0d1020;
            --blue: #448AFF;
            --text: #ffffff;
            --text2: #bcc6e0;
            --text3: #8899cc;
            --text4: #5a6a99;
            --green: #2ed573;
            --red: #ff4757;
            --orange: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 35px;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin: 0 auto 15px;
            display: block;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--blue), #2962FF);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .app-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
        }

        .app-name span {
            color: var(--blue);
        }

        .app-tagline {
            font-size: 12px;
            color: var(--blue);
            margin-top: 5px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .info-box {
            background: rgba(68,138,255,0.08);
            border: 1px solid rgba(68,138,255,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-box i {
            color: var(--blue);
            font-size: 14px;
        }

        .info-box span {
            font-size: 12px;
            color: var(--text2);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 14px 16px;
            background: var(--input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--blue);
        }

        .input-wrapper input::placeholder {
            color: var(--text4);
        }

        .paste-btn {
            padding: 14px 20px;
            background: rgba(68,138,255,0.1);
            border: 1px solid rgba(68,138,255,0.2);
            border-radius: 12px;
            color: var(--blue);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .paste-btn:hover {
            background: rgba(68,138,255,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue), #2962FF);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(68,138,255,0.3);
        }

        .package-btn {
            width: 100%;
            padding: 14px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .package-btn:hover {
            border-color: var(--blue);
            background: rgba(68,138,255,0.05);
        }

        .telegram-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0088cc, #006699);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,136,204,0.3);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-size: 12px;
        }

        .message.error {
            background: rgba(255,71,87,0.1);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .message.success {
            background: rgba(46,213,115,0.1);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: rgba(255,255,255,0.1);
            font-size: 10px;
            z-index: 100;
        }

        .watermark a {
            color: rgba(255,255,255,0.2);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
            }
            .paste-btn {
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <img src="logo.png" alt="Logo" class="logo-img" id="logoImg"
                 onerror="this.style.display='none'; document.getElementById('fallbackIcon').style.display='flex';">
            <div class="logo-icon" id="fallbackIcon" style="display: none;">
                <i class="fas fa-tools"></i>
            </div>
            <div class="app-name"><span>REVO</span> FIXER</div>
            <div class="app-tagline">⚡ CRAZY TIME REVO FIXER ⚡</div>
        </div>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            <span>Enter your valid license key to continue</span>
        </div>

        <div class="input-group">
            <label class="input-label">LICENSE KEY</label>
            <div class="input-wrapper">
                <input type="password" id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="25" autocomplete="off">
                <button class="paste-btn" onclick="pasteFromClipboard()">
                    <i class="fas fa-paste"></i> Paste
                </button>
            </div>
        </div>

        <button class="login-btn" onclick="login()">
            <i class="fas fa-key"></i> Activate License
        </button>

        <button class="package-btn" onclick="window.location.href='packages.html'">
            <i class="fas fa-shopping-cart"></i> Buy License
        </button>

        <button class="telegram-btn" onclick="window.open('https://t.me/+CNJHfpdP1ck0NDA1', '_blank')">
            <i class="fab fa-telegram"></i> Support
        </button>

        <div id="message" class="message"></div>
    </div>

    <div class="watermark">
        Developer <a href="https://t.me/RevoAgent" target="_blank">@RevoAgent</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7UVJOB_jWbPuRAqkVXJfq4MgOYUS8hds",
            authDomain: "revo-fixer-18514.firebaseapp.com",
            databaseURL: "https://revo-fixer-18514-default-rtdb.firebaseio.com",
            projectId: "revo-fixer-18514",
            storageBucket: "revo-fixer-18514.firebasestorage.app",
            messagingSenderId: "556764878482",
            appId: "1:556764878482:web:ba5c72a25db0127572384b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function getDeviceId() {
            let deviceId = localStorage.getItem('deviceId');
            if (!deviceId) {
                deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('deviceId', deviceId);
            }
            return deviceId;
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = msg;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 4000);
        }

        window.pasteFromClipboard = async () => {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('licenseKey').value = text.trim().toUpperCase();
                showMessage('License key pasted!', 'success');
            } catch(err) {
                showMessage('Press Ctrl+V to paste', 'error');
            }
        };

        window.login = async () => {
            const licenseKey = document.getElementById('licenseKey').value.trim().toUpperCase();
            const deviceId = getDeviceId();

            if (!licenseKey) {
                showMessage('Please enter license key!', 'error');
                return;
            }

            showMessage('Verifying...', 'success');

            try {
                const snapshot = await db.ref(`securityCodes/${licenseKey}`).once('value');

                if (!snapshot.exists()) {
                    showMessage('Invalid license key!', 'error');
                    return;
                }

                const keyData = snapshot.val();

                // Check if key is banned
                if (keyData.status === 'banned') {
                    showMessage('License key blocked. Contact support.', 'error');
                    return;
                }

                // Check if key needs reset
                if (keyData.status === 'reset_required') {
                    showMessage('Your key requires reset. Contact @RevoAgent to reset your key', 'error');
                    return;
                }

                // Get device login counts
                let deviceLogins = keyData.deviceLogins || {};
                let currentDeviceAttempts = deviceLogins[deviceId] || 0;

                // 🔴 CRITICAL: Check if device has already reached 3 login attempts
                if (currentDeviceAttempts >= 3) {
                    // Mark key for reset
                    await db.ref(`securityCodes/${licenseKey}`).update({
                        status: 'reset_required',
                        resetRequestedAt: Date.now(),
                        resetRequestedBy: deviceId
                    });
                    showMessage('❌ Your key is used on another device. Contact @RevoAgent to reset your key', 'error');
                    return;
                }

                let userId = keyData.usedBy;
                const now = Date.now();

                if (!userId) {
                    // NEW USER: Create account
                    userId = 'user_' + now + '_' + Math.random().toString(36).substring(2, 8);
                    
                    const packageInfo = keyData.package || { 
                        name: '1 Hour Package', 
                        price: 2000, 
                        hours: 1
                    };
                    
                    const endTime = now + (packageInfo.hours * 60 * 60 * 1000);

                    const userData = {
                        username: 'User',
                        balance: 0,
                        createdAt: now,
                        package: {
                            name: packageInfo.name,
                            price: packageInfo.price,
                            hours: packageInfo.hours,
                            status: 'approved',
                            startTime: now,
                            endTime: endTime
                        },
                        usedKey: licenseKey,
                        deviceId: deviceId,
                        lastLogin: now,
                        activity: [{
                            text: '✅ Account created with license key',
                            time: now
                        }]
                    };
                    
                    await db.ref(`users/${userId}`).set(userData);

                    // Update key: mark as used and increment device count
                    deviceLogins[deviceId] = 1;
                    await db.ref(`securityCodes/${licenseKey}`).update({
                        status: 'used',
                        usedBy: userId,
                        usedAt: now,
                        deviceLogins: deviceLogins,
                        totalDevices: Object.keys(deviceLogins).length
                    });
                    
                    showMessage('✅ License activated! Welcome!', 'success');
                    
                } else {
                    // EXISTING USER: Check if this device is already registered or increment count
                    
                    // If device is new, increment the count
                    if (deviceLogins[deviceId] === undefined) {
                        deviceLogins[deviceId] = 1;
                    } else {
                        deviceLogins[deviceId] = currentDeviceAttempts + 1;
                    }
                    
                    await db.ref(`securityCodes/${licenseKey}`).update({
                        lastLogin: now,
                        deviceLogins: deviceLogins,
                        lastDeviceId: deviceId
                    });

                    await db.ref(`users/${userId}`).update({
                        lastLogin: now,
                        deviceId: deviceId
                    });
                    
                    // Add activity log
                    await db.ref(`users/${userId}/activity`).push({
                        text: `🔑 Login attempt #${deviceLogins[deviceId]} from this device`,
                        time: now
                    });
                    
                    showMessage('✅ Login successful!', 'success');
                }

                localStorage.setItem('userId', userId);
                localStorage.setItem('licenseKey', licenseKey);

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch(error) {
                console.error('Login error:', error);
                showMessage('Error: ' + error.message, 'error');
            }
        };
    </script>
</body>
</html>
